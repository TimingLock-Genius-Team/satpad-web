:root {
  /* Brand ramp — Eulr Green */
  --eulr-50: #E6FFF4;
  --eulr-100: #B3FFD9;
  --eulr-200: #80FFBE;
  --eulr-300: #4DFFA3;
  --eulr-400: #1AFF88;
  --eulr-500: #00FF88;
  --eulr-600: #00CC6D;
  --eulr-700: #009953;
  --eulr-800: #006638;
  --eulr-900: #00331C;

  /* Neutrals — dark theme (default) */
  --bg-base: #0A0B0E;
  --bg-surface: #13151A;
  --bg-elevated: #1C1F26;
  --bg-overlay: rgba(10, 11, 14, 0.85);
  --border-subtle: #1F232B;
  --border-default: #2A2F3A;
  --border-strong: #3D4453;
  --text-primary: #F2F4F8;
  --text-secondary: #9BA3B5;
  --text-tertiary: #5F6878;
  --text-disabled: #3A4150;

  /* Brand tint */
  --eulr-bg: rgba(0, 255, 136, 0.12);

  /* Semantic */
  --success: #00FF88;
  --success-bg: rgba(0, 255, 136, 0.12);
  --warning: #FFB020;
  --warning-bg: rgba(255, 176, 32, 0.14);
  --danger: #FF3358;
  --danger-bg: rgba(255, 51, 88, 0.14);
  --info: #3399FF;
  --info-bg: rgba(51, 153, 255, 0.14);

  --trade-buy: #00FF88;
  --trade-sell: #FF3358;

  /* Fonts */
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  /* Radii */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 24px;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.6);
  --glow-brand: 0 0 24px rgba(0, 255, 136, 0.30);
  --glow-danger: 0 0 16px rgba(255, 51, 88, 0.30);

  /* Motion */
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
  --ease-in: cubic-bezier(0.4, 0, 1, 1);
  --duration-fast: 150ms;
  --duration-base: 250ms;
  --duration-slow: 400ms;
  --duration-curve: 800ms;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#root {
  min-height: 100vh;
}

button {
  font-family: inherit;
  border: none;
  background: none;
  cursor: pointer;
  color: inherit;
}

input, textarea {
  font-family: inherit;
  color: inherit;
  background: none;
  border: none;
  outline: none;
}

a { color: inherit; text-decoration: none; }

.mono, .numeric {
  font-family: var(--font-mono);
  font-feature-settings: 'tnum' 1, 'cv11' 1;
}

table, .numeric, input[type="number"] {
  font-feature-settings: 'tnum' 1, 'cv11' 1;
}

:focus-visible {
  outline: 2px solid var(--eulr-500);
  outline-offset: 2px;
  border-radius: inherit;
}

/* Faint dotted hero grid */
.hero-grid {
  background-image: radial-gradient(circle, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
  background-size: 24px 24px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* Animations */
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.shimmer {
  background: linear-gradient(90deg, var(--bg-elevated) 0%, var(--bg-surface) 50%, var(--bg-elevated) 100%);
  background-size: 800px 100%;
  animation: shimmer 1.4s infinite linear;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.pulse-dot { animation: pulse-dot 1.4s infinite ease-in-out; }

@keyframes flash-bg {
  0% { background-color: var(--eulr-bg); }
  100% { background-color: transparent; }
}
.flash-bg { animation: flash-bg 1.2s ease-out; }

@keyframes slide-up-fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.slide-up { animation: slide-up-fade 250ms var(--ease-out); }

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }

@keyframes brand-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.85; }
}
.brand-pulse { animation: brand-pulse 800ms infinite ease-in-out; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

</head>
